name: Publish Container

on:
  push:
    branches:
      - master
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            # Triggered by a tag push — use the tag directly
            TAG="${GITHUB_REF#refs/tags/}"
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "create_tag=false" >> $GITHUB_OUTPUT
            echo "Version from tag: $TAG"
          else
            # Triggered by a branch push — auto-increment
            LATEST=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
            LATEST=${LATEST:-v0.0.0}
            MAJOR=$(echo $LATEST | cut -d. -f1 | tr -d v)
            MINOR=$(echo $LATEST | cut -d. -f2)
            PATCH=$(echo $LATEST | cut -d. -f3)
            NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
            echo "tag=$NEXT" >> $GITHUB_OUTPUT
            echo "create_tag=true" >> $GITHUB_OUTPUT
            echo "Next version: $NEXT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./infinite-campus-exporter
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ic-campus-exporter:latest
            ghcr.io/${{ github.repository_owner }}/ic-campus-exporter:${{ steps.version.outputs.tag }}

      - name: Tag release
        if: steps.version.outputs.create_tag == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}
