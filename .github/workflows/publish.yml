name: Publish Container

on:
  push:
    branches:
      - master

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get next version
        id: version
        run: |
          # Get the latest semver tag, default to v0.0.0 if none exists
          LATEST=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          LATEST=${LATEST:-v0.0.0}
          # Increment patch version
          MAJOR=$(echo $LATEST | cut -d. -f1 | tr -d v)
          MINOR=$(echo $LATEST | cut -d. -f2)
          PATCH=$(echo $LATEST | cut -d. -f3)
          NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "tag=$NEXT" >> $GITHUB_OUTPUT
          echo "Next version: $NEXT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./infinite-campus-exporter
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ic-campus-exporter:latest
            ghcr.io/${{ github.repository_owner }}/ic-campus-exporter:${{ steps.version.outputs.tag }}

      - name: Tag release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}
