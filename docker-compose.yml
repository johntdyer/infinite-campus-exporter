services:
  ic-exporter:
    image: ghcr.io/johntdyer/ic-campus-exporter:latest
    build: ./infinite-campus-exporter
    restart: unless-stopped
    env_file: ./infinite-campus-exporter/.env
    ports:
      - "9877:9877"

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./examples/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-remote-write-receiver

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./examples/grafana_dashboard.json:/var/lib/grafana/dashboards/ic_campus.json:ro
      - ./examples/grafana_provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
